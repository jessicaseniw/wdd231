    <!-- Open Graph -->
    <meta property="og:title" content="Cachoeirinha Chamber of Commerce">

        content="Join the Cachoeirinha Chamber of Commerce and discover membership opportunities, business networking, and community partnerships.">
    <meta property="og:image" content="https://jessicaseniw.github.io/wdd231/chamber/images/chamber-social.png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- CSS -->

    <!-- Base site layout -->

    <link rel="stylesheet" href="styles/directory-large.css">

<body>

    <header>
        <nav class="navigation">

            <a href="index.html" class="logo">
                <img src="../images/logo.svg" alt="Cachoeirinha Chamber logo" loading="lazy">
            </a>

            <p>Cachoeirinha Chamber of Commerce</p>

            <button id="menuButton" aria-label="Toggle navigation menu" aria-expanded="false">
                ☰
            </button>

            <ul id="navLinks">
                <li><a href="/index.html" class="active">Home</a></li>
                <li><a href="directory.html">Chamber</a></li>
                <li><a href="#">Final</a></li>
            </ul>

        </nav>
    </header>

    <main>

        <h1>Join the Chamber</h1>

        <form method="get" action="thankyou.html">

            <!-- First Name -->

            <div class="form-group">

                <label for="firstName">First Name *</label>

                <input type="text" id="firstName" name="firstName" title="Enter your first name"
                    autocomplete="given-name" required>

            </div>

            <!-- Last Name -->

            <div class="form-group">

                <label for="lastName">Last Name *</label>

                <input type="text" id="lastName" name="lastName" title="Enter your last name" autocomplete="family-name"
                    required>

            </div>

            <!-- Organization Title -->

            <div class="form-group">

                <label for="organizationTitle">
                    Organization Title
                </label>

                <input type="text" id="organizationTitle" name="organizationTitle"
                    title="Enter your organizational title using only letters, spaces, and hyphens (minimum 7 characters)"
                    autocomplete="organization-title" pattern="[A-Za-z\s\-]{7,}">

            </div>

            <!-- Email -->

            <div class="form-group">

                <label for="email">Email Address *</label>

                <input type="email" id="email" name="email" title="Enter a valid email address" autocomplete="email"
                    placeholder="example@company.com" required>

            </div>

            <!-- Phone -->

            <div class="form-group">

                <label for="phone">Mobile Phone *</label>

                <input type="tel" id="phone" name="phone" title="Enter your mobile phone number" autocomplete="tel"
                    required>

            </div>

            <!-- Organization Name -->

            <div class="form-group">

                <label for="organization">
                    Business / Organization Name *
                </label>

                <input type="text" id="organization" name="organization"
                    title="Enter your business or organization name" autocomplete="organization" required>

            </div>

            <!-- Membership Level -->

            <div class="form-group">

                <label for="membershipLevel">
                    Membership Level *
                </label>

                <select id="membershipLevel" name="membershipLevel" title="Select a membership level" required>

                    <option value="">
                        Select a Membership Level
                    </option>

                    <option value="np">
                        NP Membership (Non-Profit Organizations)
                    </option>

                    <option value="bronze">
                        Bronze Membership
                    </option>

                    <option value="silver">
                        Silver Membership
                    </option>

                    <option value="gold">
                        Gold Membership
                    </option>

                </select>

            </div>

            <!-- Organization Description -->

            <div class="form-group">

                <label for="organizationDescription">
                    Business / Organization Description
                </label>

                <textarea id="organizationDescription" name="organizationDescription"
                    title="Provide a description of your business or organization" rows="5"></textarea>

            </div>

            <!-- Timestamp -->

            <input type="hidden" id="timestamp" name="timestamp">

            <!-- Submit -->

            <input type="submit" value="Apply for Membership">

        </form>

    </main>

    <footer>

        <div class="icon-social">

            <a href="https://github.com" aria-label="GitHub">

            </p>
