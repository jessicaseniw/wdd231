<!-- accommodations.html -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Wanderly | Accommodations</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Browse available accommodations.">
    <meta name="author" content="Jéssica Seniw">

    <!-- CSS -->
    <link rel="stylesheet" href="styles/wanderly-small.css">
    <link rel="stylesheet" href="styles/wanderly-large.css">
    <link rel="stylesheet" href="styles/wanderly-normalize.css">

    <!-- JavaScript -->
    <script src="scripts/data.js" defer></script>
    <script src="scripts/wanderly.js" defer></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Roboto&display=swap"
        rel="stylesheet">
</head>

<body>
    <header class="main-header">
        <div class="logo">
            <h1>Wanderly</h1>
        </div>

        <nav class="main-nav">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="wanderly.html">Destinations</a></li>
                <li><a href="accommodations.html" class="active">Accommodations</a></li>
                <li><a href="trips.html">My Trips</a></li>
            </ul>
        </nav>

        <div class="header-actions">
            <span class="route-display" id="selected-route">...</span>
        </div>
    </header>

    <section class="booking-steps">
        <div class="step completed">1. Destination</div>
        <div class="step active" aria-current="step"> 2. Accommodation</div>
        <div class="step">3. Trip Summary</div>
    </section>

    <section class="search-summary">

        <div class="search-info">
            <span class="label">Selected destination</span>
            <strong id="current-destination"></strong>
            <span id="stay-period"></span>
        </div>

        <button class="change-btn" onclick="changeDestination()">
            ← Change destination
        </button>

    </section>

    <main>
        <section id="accommodations">

            <h2>Choose Your Accommodation</h2>

            <p class="page-description">
                Select the accommodation that best fits your trip.
            </p>

            <div class="grid national-grid"></div>

        </section>
    </main>

    <footer>
        <p>&copy; 2026 Wanderly | WDD 231 Project</p>
        <a href="references.html">References</a>
    </footer>
</body>

</html>
