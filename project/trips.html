<!-- trips.html -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Wanderly | My Trip</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="View and manage your saved trips.">
    <meta name="author" content="Jéssica Seniw">

    <!-- CSS -->
    <link rel="stylesheet" href="styles/wanderly-small.css">
    <link rel="stylesheet" href="styles/wanderly-large.css">
    <link rel="stylesheet" href="styles/wanderly-normalize.css">

    <!-- JavaScript -->
    <script src="scripts/data.js" defer></script>
    <script src="scripts/wanderly.js" defer></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Roboto&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- HEADER -->
    <header class="main-header">
        <div class="logo">
            <h1>Wanderly</h1>
        </div>

        <nav class="main-nav">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="wanderly.html">Destinations</a></li>
                    <li><a href="accommodations.html">Accommodations</a></li>
                    <li><a href="trips.html" class="active">My Trips</a></li>
                </ul>
        </nav>

        <div class="header-actions">
            <span class="route-display" id="selected-route">...</span>
        </div>
    </header>

    <section class="booking-steps">
        <div class="step completed">1. Destination</div>
        <div class="step completed">2. Accommodation</div>
        <div class="step active" aria-current="step"> 3. Trip Summary</div>
    </section>

    

    <main>
        <!-- TRIP SUMMARY -->
        <section id="trip-summary">
            <button class="change-btn" onclick="changeDestination()">Change destination</button>
            <h2>Review Your Booking</h2>

            <div class="summary-content">
                <!-- Block 1: Destination, dates, and accommodation -->
                <div id="trip-info" class="card"></div>

                <!-- Block 2: Prices -->
                <div id="trip-values" class="card"></div>
            </div>
        </section>

        <div class="trip-actions">

            <button class="secondary-btn"
                    onclick="window.location.href='accommodations.html'">
                Change Accommodation
            </button>

            <button
                type="button" class="primary-btn" id="confirm-booking"> Confirm Booking
            </button>

        </div>

        <div id="booking-message" aria-live="polite"></div>
    </main>

    <footer>
        <p>&copy; 2026 Wanderly | WDD 231 Project</p>
        <a href="references.html">References</a>
    </footer>
</body>

</html>
